name: Generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: dawsdo
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_snake=#F4F1DE&color_dots=#1a2336,#2c4366,#5b7298,#8da9c8,#bdd1e5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}